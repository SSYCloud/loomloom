name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Build CLI
        working-directory: cli
        run: |
          mkdir -p ../dist
          output_path="../dist/assemble-flow-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output_path="${output_path}.exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOWORK=off \
            go build \
              -ldflags "-X github.com/SSYCloud/AssembleFlow/cli/internal/version.Version=${{ github.ref_name }}" \
              -o "$output_path" \
              ./cmd/assemble-flow
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: assemble-flow-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/assemble-flow-${{ matrix.goos }}-${{ matrix.goarch }}*

  package-assets:
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Normalize dist layout
        run: |
          mkdir -p release
          while IFS= read -r binary; do
            name="$(basename "$binary")"
            staging="$(mktemp -d)"
            if [[ "$name" == *.exe ]]; then
              cp "$binary" "$staging/assemble-flow.exe"
              (cd "$staging" && zip -q "release.zip" assemble-flow.exe)
              mv "$staging/release.zip" "release/${name%.exe}.zip"
            else
              cp "$binary" "$staging/assemble-flow"
              tar -C "$staging" -czf "release/${name}.tar.gz" assemble-flow
            fi
            rm -rf "$staging"
          done < <(find dist -type f -name 'assemble-flow-*' | sort)
          tar -czf release/assemble-flow-skills.tar.gz skills
          (cd . && zip -qr release/assemble-flow-skills.zip skills)
          cp install.sh install.ps1 uninstall.sh uninstall.ps1 manifest.json README.md release/
          (cd release && sha256sum * > checksums.txt)
      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release/*
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is required to publish Formula/assemble-flow.rb" >&2
            exit 1
          fi

          tap_dir="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/SSYCloud/homebrew-tap.git" "$tap_dir"
          ./scripts/render-homebrew-formula.sh --tag "$RELEASE_TAG" --checksums release/checksums.txt > "$tap_dir/Formula/assemble-flow.rb"
          rm -f "$tap_dir/Formula/batchjob-cli.rb"

          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --short -- Formula/assemble-flow.rb Formula/batchjob-cli.rb)" ]]; then
            echo "Formula/assemble-flow.rb is already up to date"
            exit 0
          fi

          git add Formula/assemble-flow.rb Formula/batchjob-cli.rb
          git commit -m "assemble-flow ${RELEASE_TAG}"
          git push origin main
